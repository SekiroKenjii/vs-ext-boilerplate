name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Package VSIX
        run: pnpm run package

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: '*.vsix'
          generate_release_notes: true
# Marketplace / Open VSX publishing is intentionally NOT wired up yet.
# To enable later: add VSCE_PAT / OVSX_PAT secrets (see .github/REPO_SETUP.md) and
# either re-add publish steps here or run `pnpm run publish:vsce` / `publish:ovsx`
# locally. The vscode-publishing skill documents the full procedure.
