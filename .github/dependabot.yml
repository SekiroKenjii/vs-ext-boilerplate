version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    # Only propose releases that have matured, mitigating compromised-just-
    # published-package risk (the supply-chain gate, applied at adoption time).
    cooldown:
      default-days: 7
      semver-major-days: 14
    groups:
      dev-dependencies:
        dependency-type: development
      production-dependencies:
        dependency-type: production
    ignore:
      # Keep @types/node aligned with the Node runtime (24); allow minor/patch
      # within the major, but not major bumps ahead of the runtime.
      - dependency-name: '@types/node'
        update-types: ['version-update:semver-major']

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns:
          - '*'
