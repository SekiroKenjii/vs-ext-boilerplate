allowBuilds:
  # esbuild needs its postinstall to provision the platform binary.
  esbuild: true
  # Native deps only used during marketplace publish/login; not needed to
  # build, test, or package, and their native builds often require toolchains
  # that aren't present. Left disabled by default.
  '@vscode/vsce-sign': false
  keytar: false
# Disable pnpm's release-age supply-chain gate for this project so installs are
# deterministic everywhere: a committed, reviewed lockfile installs identically
# regardless of when its packages were published. Without this, `pnpm install
# --frozen-lockfile` in CI can fail whenever the lockfile contains a package
# published within the last day (e.g. a just-merged Dependabot bump).
#
# Supply-chain *maturity* is instead enforced at update time via Dependabot's
# cooldown (see .github/dependabot.yml), which is the correct layer: gate what
# you adopt, not what you reproduce.
minimumReleaseAge: 0
